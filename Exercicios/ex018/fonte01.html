<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes com Google Foontes</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap');


        
    @import url('https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Noto+Serif:ital,wdth,wght@0,62.5..100,100..900;1,62.5..100,100..900&display=swap');  


        h1 {
            font: italic normal 3em 'noto-serif', serif;
            color: rgb(0, 255, 234);
        }
            /*
            leight = letra fina
            normal = letra fina 
            bold = negrito
            bolder = extranegrito

            shorthand font
            font-style -> font-weight -> font-size -> font-family

            equivalente a: 
            font-style: italic;
            font-weigth: bolder;
            font-size: 3em;
            font-family: 'work sans', 'sans-serif;'
            */
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Ullam neque nulla ipsam eius vero pariatur sapiente nesciunt. Tempore, reprehenderit culpa. Debitis quidem tempora saepe soluta, laborum assumenda? Inventore, et optio?</p>

</body>
</html>
