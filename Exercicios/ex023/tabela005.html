<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercícios de Tabelas</title>

    <style>
     body {
            font-family: Arial, Helvetica, sans-serif;
        }
        table {
            height: 50px;
            width: 500px;
            border-collapse: collapse;
        }
        caption {
            font: 1.3em;
            font-weight: bold;
            padding: 10px;
        }
        tr {
            text-align: center;
            
        }
        th, td {
            border: 1px solid Black;
            padding: 10px;
            
        }
        .cnome {
            background-color: aquamarine;
        }
        div#container {
            overflow-x: auto;
        }
    </style>

</head>
<body>
    <h1>Exercícios de Tabelas</h1>

    <div id="container">
        <table>
            <colgroup>
                <col class="cnome">
                <col class="csexo">
                <col class="cidade">
                <col class="cprofissao">
            </colgroup>
            <caption>Cadastro</caption>
            <thead>
                <tr>
                    <th scope="col">Nome</th>
                    <th scope="col">Sexo</th>
                    <th scope="col">Idade</th>
                    <th scope="col">Profissão</th>
                </tr>
            </thead>
            <tbody>
                    <tr>
                        <td>Marcos</td>
                        <td>Masculino</td>
                        <td>30</td>
                        <td>Tecnico Inf</td>
                    </tr>
                    <tr>
                        <td>Edvana</td>
                        <td>Feminino</td>
                        <td>28</td>
                        <td>Professora</td>
                    </tr>
                    <tr>
                        <td>Delvan</td>
                        <td>Masculino</td>
                        <td>37</td>
                        <td>Uber</td>
                    </tr>
                    <tr>
                        <td>Regina</td>
                        <td>Feminina</td>
                        <td>59</td>
                        <td>Doméstica</td>
                    </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
