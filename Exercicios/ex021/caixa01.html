<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        h1 {
            background-color: aquamarine;
            height: 40px;
            width: 450px;
            

           /* 
            Essa configuração equivale a linha de baixo de uma forma simplificada
            border-width: 3px;
            border-style: solid;
            border-color: rgb(0, 78, 78); */

            border: 3px solid rgb(0, 78, 78);

            /* 
            Essa configuração equivale a linha de baixo de uma forma simplificada
            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px; */

            padding: 10px;

            margin: auto; /*Código para centralizar uma div*/

        }
        a {
           border-width: 3px;
           border-style: solid;
           border-color: burlywood;
        }
    </style>
</head>
<body>
    <h1>Exemplo de Caixa Box-Level</h1>
    <p>Paragrafo também são exemplos de box level mas os, <a href="#">links são exemplos de caixa inline-level.</a> Vamos ver como isso funciona!</p>
</body>
</html>
